<div class="min-h-screen bg-slate-50 px-4 py-10" [dir]="isRTL ? 'rtl' : 'ltr'">
  <div class="mx-auto max-w-xl rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm shadow-slate-200/60">
    <p class="text-[0.72rem] font-extrabold uppercase tracking-[0.18em] text-zadna-primary/70">
      {{ 'RESET_PASSWORD_PAGE.EYEBROW' | translate }}
    </p>
    <h1 class="mt-2 text-2xl font-black text-slate-900">
      {{ 'RESET_PASSWORD_PAGE.TITLE' | translate }}
    </h1>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <label class="block space-y-2">
        <span class="text-sm font-bold text-slate-600">{{ 'RESET_PASSWORD_PAGE.FIELDS.EMAIL' | translate }}</span>
        <input class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 outline-none transition focus:border-zadna-primary focus:bg-white" formControlName="identifier" type="email">
      </label>

      <label class="block space-y-2">
        <span class="text-sm font-bold text-slate-600">{{ 'RESET_PASSWORD_PAGE.FIELDS.OTP' | translate }}</span>
        <input class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 outline-none transition focus:border-zadna-primary focus:bg-white" formControlName="otpCode" maxlength="4" type="text" dir="ltr">
      </label>

      <label class="block space-y-2">
        <span class="text-sm font-bold text-slate-600">{{ 'RESET_PASSWORD_PAGE.FIELDS.NEW_PASSWORD' | translate }}</span>
        <input class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 outline-none transition focus:border-zadna-primary focus:bg-white" formControlName="newPassword" [type]="showPassword ? 'text' : 'password'">
      </label>

      <label class="block space-y-2">
        <span class="text-sm font-bold text-slate-600">{{ 'RESET_PASSWORD_PAGE.FIELDS.CONFIRM_PASSWORD' | translate }}</span>
        <input class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 outline-none transition focus:border-zadna-primary focus:bg-white" formControlName="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'">
      </label>

      @if (errorMessage) {
        <div class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700">
          {{ errorMessage }}
        </div>
      }

      @if (successMessage) {
        <div class="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-700">
          {{ successMessage }}
        </div>
      }

      <button
        type="submit"
        [disabled]="isLoading"
        class="inline-flex h-12 w-full items-center justify-center rounded-2xl bg-slate-950 px-4 text-sm font-black text-white transition hover:-translate-y-0.5 disabled:opacity-60">
        @if (isLoading) {
          <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/25 border-t-white"></span>
        } @else {
          <span>{{ 'RESET_PASSWORD_PAGE.SUBMIT' | translate }}</span>
        }
      </button>
    </form>
  </div>
</div>
