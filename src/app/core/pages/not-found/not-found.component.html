<div
  class="relative w-full overflow-hidden"
  [ngClass]="embedded ? 'flex min-h-[calc(100vh-12rem)] items-center justify-center px-2 py-8 sm:px-4' : 'flex min-h-screen items-center justify-center bg-zadna-bgLight px-4 py-16 sm:px-6'">

  <div class="pointer-events-none absolute inset-0 overflow-hidden" aria-hidden="true">
    <div class="absolute -top-20 start-[-10%] h-64 w-64 rounded-full bg-zadna-primary/10 blur-3xl"></div>
    <div class="absolute bottom-[-10%] end-[-5%] h-72 w-72 rounded-full bg-zadna-accent/10 blur-3xl"></div>
    <div class="absolute inset-0 bg-[linear-gradient(rgba(18,124,140,0.035)_1px,transparent_1px),linear-gradient(90deg,rgba(18,124,140,0.035)_1px,transparent_1px)] bg-[size:24px_24px] [mask-image:radial-gradient(circle_at_center,black,transparent_80%)]"></div>
  </div>

  <div class="relative z-10 w-full max-w-2xl overflow-hidden rounded-[2rem] border border-slate-200/80 bg-white p-7 text-center shadow-[0_24px_60px_rgba(15,23,42,0.08)] sm:p-10">
    <div class="absolute inset-x-0 top-0 h-1.5 bg-gradient-to-r from-zadna-primary via-zadna-accent to-zadna-primary"></div>

    <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-[1.4rem] bg-slate-50 ring-1 ring-slate-100">
      <svg class="h-10 w-10 text-zadna-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    </div>

    <p class="bg-gradient-to-br from-zadna-primary via-zadna-primaryDark to-zadna-accent bg-clip-text text-7xl font-black leading-none tracking-tight text-transparent sm:text-8xl">
      404
    </p>

    <h1 class="mt-4 text-2xl font-black text-slate-900 sm:text-3xl">
      {{ 'NOT_FOUND.TITLE' | translate }}
    </h1>

    <p class="mx-auto mt-3 max-w-lg text-sm font-semibold leading-7 text-slate-500 sm:text-base">
      {{ 'NOT_FOUND.MESSAGE' | translate }}
    </p>

    <p *ngIf="attemptedPath" class="mx-auto mt-5 inline-flex max-w-full items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-4 py-2 text-[11px] font-bold text-slate-500">
      <span class="uppercase tracking-[0.16em] text-slate-400">{{ 'NOT_FOUND.PATH_LABEL' | translate }}</span>
      <code class="truncate font-mono text-slate-700" dir="ltr">/{{ attemptedPath }}</code>
    </p>

    <div class="mt-8 flex flex-col items-stretch justify-center gap-3 sm:flex-row sm:items-center">
      <a [routerLink]="isAuthenticated ? '/dashboard' : '/login'"
         class="inline-flex items-center justify-center rounded-[16px] bg-zadna-primary px-6 py-3 text-sm font-black text-white shadow-[0_14px_28px_rgba(18,124,140,0.24)] transition hover:-translate-y-0.5">
        {{ (isAuthenticated ? 'NOT_FOUND.GO_DASHBOARD' : 'NOT_FOUND.GO_LOGIN') | translate }}
      </a>
      <button type="button" (click)="goBack()"
         class="inline-flex items-center justify-center rounded-[16px] border border-slate-200 bg-white px-6 py-3 text-sm font-black text-slate-700 transition hover:bg-slate-50">
        {{ 'NOT_FOUND.GO_BACK' | translate }}
      </button>
    </div>
  </div>
</div>
