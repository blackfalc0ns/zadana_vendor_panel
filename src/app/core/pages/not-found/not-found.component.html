<div
  class="relative min-h-screen w-full flex flex-col bg-zadna-bgLight overflow-hidden font-sans selection:bg-zadna-primary selection:text-white"
  [dir]="translate.currentLang === 'ar' ? 'rtl' : 'ltr'">

  <!-- ================= STYLE BLOCK FOR CUSTOM ANIMATIONS ================= -->
  <style>
    @keyframes float {
      0%, 100% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(3deg);
      }
    }

    @keyframes shadow {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        opacity: 0.15;
      }
      50% {
        transform: translateX(-50%) scale(0.75);
        opacity: 0.07;
      }
    }

    .animate-float-sphere {
      animation: float 5s ease-in-out infinite;
    }

    .animate-shadow-sphere {
      animation: shadow 5s ease-in-out infinite;
    }
  </style>

  <!-- ================= BACKGROUND ARTEFACTS ================= -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-br from-zadna-primaryLight/5 via-transparent to-zadna-accentLight/5"></div>
    
    <!-- Top Right Radial Glow -->
    <div class="absolute -top-24 -right-24 w-[45vw] h-[45vw] opacity-40 blur-[120px]"
      style="background: radial-gradient(circle at center, rgba(18, 124, 140, 0.25) 0%, transparent 70%);">
    </div>
    
    <!-- Bottom Left Radial Glow -->
    <div class="absolute -bottom-24 -left-24 w-[45vw] h-[45vw] opacity-30 blur-[120px]"
      style="background: radial-gradient(circle at center, rgba(228, 130, 21, 0.15) 0%, transparent 70%);">
    </div>

    <!-- Premium Grid Lines -->
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTU5LjUgMGguNXY2MGgtLjV6TTBvNTloNjB2LjVIMHoiIGZpbGw9IiNlN2U1ZTRcIiBmaWxsLW9wYWNpdHk9IjAuMTIiLz48L3N2Zz4=')] opacity-60"></div>
  </div>

  <!-- ================= TOP HEADER (Like the reference image) ================= -->
  <header class="relative z-10 w-full max-w-7xl mx-auto px-6 sm:px-8 lg:px-12 py-6 flex items-center justify-between border-b border-gray-100/50 bg-white/30 backdrop-blur-md">
    <!-- Left: Logo & Brand Name -->
    <div class="flex items-center gap-3">
      <div class="h-10 w-32 relative flex items-center">
        <img src="assets/images/logo/zadana-mark.svg" alt="Zadana Logo"
          class="h-full w-full object-contain filter drop-shadow-sm"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="absolute inset-0 hidden items-center text-zadna-primary font-black text-xl tracking-wider" style="display: none;">
          ZADANA
        </div>
      </div>
    </div>

    <!-- Right: Language Switcher -->
    <div class="flex items-center gap-4">
      <div class="flex items-center bg-white/80 border border-gray-100 p-1 rounded-full shadow-sm dir-ltr" style="direction: ltr;">
        <button (click)="switchLanguage('en')"
          [ngClass]="{'bg-zadna-primary text-white shadow-sm scale-105': translate.currentLang === 'en', 'text-gray-500 hover:text-zadna-primary hover:bg-gray-50': translate.currentLang !== 'en'}"
          class="px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase transition-all duration-300">
          EN
        </button>
        <button (click)="switchLanguage('ar')"
          [ngClass]="{'bg-zadna-primary text-white shadow-sm scale-105': translate.currentLang === 'ar', 'text-gray-500 hover:text-zadna-primary hover:bg-gray-50': translate.currentLang !== 'ar'}"
          class="px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase transition-all duration-300">
          AR
        </button>
      </div>
    </div>
  </header>

  <!-- ================= MAIN CONTENT (No container card, floats freely like the image) ================= -->
  <main class="relative z-10 flex-1 w-full max-w-4xl mx-auto px-4 flex flex-col items-center justify-center text-center py-12">
    
    <!-- ================= 404 ARTWORK WITH 3D SPHERE ================= -->
    <div class="flex items-center justify-center gap-4 sm:gap-8 select-none mb-8 relative">
      
      <!-- Left "4" -->
      <span class="text-[120px] sm:text-[170px] md:text-[210px] font-black leading-none text-slate-800 tracking-tighter drop-shadow-[0_12px_20px_rgba(0,0,0,0.12)]">
        4
      </span>

      <!-- Middle "0" (3D Brand Sphere) -->
      <div class="relative w-32 h-32 sm:w-44 sm:h-44 md:w-52 md:h-52 flex items-center justify-center">
        
        <!-- The 3D Sphere -->
        <div class="animate-float-sphere w-full h-full rounded-full flex items-center justify-center relative overflow-hidden"
             style="background: radial-gradient(circle at 35% 35%, #ffffff 0%, #b2ebf2 15%, #127C8C 50%, #085a65 85%, #03363d 100%); 
                    box-shadow: inset -15px -15px 40px rgba(0,0,0,0.55), inset 15px 15px 30px rgba(255,255,255,0.25), 0 25px 50px rgba(18,124,140,0.3); border: 1px solid rgba(255,255,255,0.2);">
          
          <!-- Glossy Highlight Curve -->
          <div class="absolute top-1 left-4 right-4 h-[35%] rounded-t-full bg-gradient-to-b from-white/30 to-transparent pointer-events-none"></div>

          <!-- Inner Logo Container (Glass Effect) -->
          <div class="w-[68%] h-[70%] rounded-full bg-white/10 backdrop-blur-[2px] border border-white/25 flex items-center justify-center shadow-inner p-4">
            <img src="assets/images/logo/zadana-mark.svg" alt="Zadana Logo" 
                 class="w-full h-full object-contain filter drop-shadow-[0_4px_8px_rgba(0,0,0,0.3)]"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="absolute inset-0 hidden items-center justify-center text-white font-black text-lg tracking-wider" style="display: none;">
              ZADANA
            </div>
          </div>
        </div>

        <!-- 3D Shadow underneath the sphere -->
        <div class="animate-shadow-sphere absolute -bottom-4 left-1/2 -translate-x-1/2 w-[85%] h-4 bg-slate-950/20 rounded-full blur-md"></div>
      </div>

      <!-- Right "4" -->
      <span class="text-[120px] sm:text-[170px] md:text-[210px] font-black leading-none text-slate-800 tracking-tighter drop-shadow-[0_12px_20px_rgba(0,0,0,0.12)]">
        4
      </span>
    </div>

    <!-- Error Title & Message -->
    <div class="space-y-4 max-w-2xl mx-auto">
      <h1 class="text-3xl sm:text-4xl font-black text-slate-800 tracking-tight">
        {{ 'NOT_FOUND.TITLE' | translate }}
      </h1>
      <p class="text-base sm:text-lg text-gray-500 font-medium leading-relaxed max-w-xl mx-auto">
        {{ 'NOT_FOUND.MESSAGE' | translate }}
      </p>
    </div>

    <!-- Attempted Path Pill -->
    <div *ngIf="attemptedPath" class="mt-6 inline-flex max-w-full items-center gap-2 rounded-full border border-slate-100 bg-slate-50/80 px-4 py-2 text-[11px] font-bold text-slate-500 shadow-sm">
      <span class="uppercase tracking-[0.16em] text-slate-400 shrink-0">{{ 'NOT_FOUND.PATH_LABEL' | translate }}</span>
      <code class="truncate font-mono text-slate-700 font-bold" dir="ltr">/{{ attemptedPath }}</code>
    </div>

    <!-- Action Buttons (Like the reference image) -->
    <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4 w-full max-w-md mx-auto">
      <a [routerLink]="isAuthenticated ? '/dashboard' : '/login'"
         class="w-full sm:w-auto group relative flex items-center justify-center py-3.5 px-10 overflow-hidden rounded-xl shadow-[0_8px_20px_rgba(18,124,140,0.25)] font-black text-white bg-zadna-primary transition-transform active:scale-[0.98]">
        <div class="absolute inset-0 bg-gradient-to-r from-zadna-primaryDark via-zadna-primary to-zadna-primaryDark opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
        <span class="relative z-10 flex items-center gap-2">
          {{ (isAuthenticated ? 'NOT_FOUND.GO_DASHBOARD' : 'NOT_FOUND.GO_LOGIN') | translate }}
          <svg class="w-4 h-4 transition-transform group-hover:translate-x-1 rtl:group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l7-7m0 0l-7-7m7 7H3"></path>
          </svg>
        </span>
      </a>
      <button type="button" (click)="goBack()"
         class="w-full sm:w-auto inline-flex items-center justify-center rounded-xl border-2 border-slate-200 hover:border-zadna-primary/30 bg-white hover:bg-zadna-primary/5 px-10 py-3.5 text-sm font-black text-slate-600 hover:text-zadna-primary transition-all active:scale-[0.98]">
        {{ 'NOT_FOUND.GO_BACK' | translate }}
      </button>
    </div>
  </main>
</div>
