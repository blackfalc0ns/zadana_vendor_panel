<div
  class="relative min-h-screen w-full flex flex-col items-center justify-center bg-zadna-bgLight px-4 py-12 sm:px-6 lg:px-8 overflow-hidden font-sans selection:bg-zadna-primary selection:text-white"
  [dir]="translate.currentLang === 'ar' ? 'rtl' : 'ltr'">

  <!-- ================= BACKGROUND ARTEFACTS ================= -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-br from-zadna-primaryLight/5 via-transparent to-zadna-accentLight/5"></div>
    
    <!-- Top Right Radial Glow -->
    <div class="absolute -top-24 -right-24 w-[40vw] h-[40vw] opacity-40 blur-[120px]"
      style="background: radial-gradient(circle at center, rgba(18, 124, 140, 0.25) 0%, transparent 70%);">
    </div>
    
    <!-- Bottom Left Radial Glow -->
    <div class="absolute -bottom-24 -left-24 w-[40vw] h-[40vw] opacity-30 blur-[120px]"
      style="background: radial-gradient(circle at center, rgba(228, 130, 21, 0.15) 0%, transparent 70%);">
    </div>

    <!-- Premium Grid Lines -->
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTU5LjUgMGguNXY2MGgtLjV6TTBvNTloNjB2LjVIMHoiIGZpbGw9IiNlN2U1ZTRcIiBmaWxsLW9wYWNpdHk9IjAuMTIiLz48L3N2Zz4=')] opacity-60"></div>
  </div>

  <!-- ================= TOP NAVIGATION (Language Switcher) ================= -->
  <div class="absolute top-6 sm:top-8 end-6 sm:end-12 z-50 flex items-center">
    <div class="flex items-center bg-white/60 backdrop-blur-2xl border border-white/80 p-1 rounded-full shadow-[0_8px_24px_rgba(18,124,140,0.08)] dir-ltr" style="direction: ltr;">
      <button (click)="switchLanguage('en')"
        [ngClass]="{'bg-white text-zadna-primaryDark shadow-md scale-105': translate.currentLang === 'en', 'text-gray-500 hover:text-zadna-primary hover:bg-white/40': translate.currentLang !== 'en'}"
        class="px-5 py-2 rounded-full text-xs font-black tracking-widest uppercase transition-all duration-300">
        EN
      </button>
      <button (click)="switchLanguage('ar')"
        [ngClass]="{'bg-white text-zadna-primaryDark shadow-md scale-105': translate.currentLang === 'ar', 'text-gray-500 hover:text-zadna-primary hover:bg-white/40': translate.currentLang !== 'ar'}"
        class="px-5 py-2 rounded-full text-xs font-black tracking-widest uppercase transition-all duration-300">
        AR
      </button>
    </div>
  </div>

  <!-- ================= MAIN CARD ================= -->
  <div class="relative z-10 w-full max-w-[580px] mx-auto">
    <!-- Decorative Glows behind Card -->
    <div class="absolute -top-12 -right-12 w-48 h-48 bg-zadna-accent/10 rounded-full blur-2xl opacity-50"></div>
    <div class="absolute -bottom-12 -left-12 w-48 h-48 bg-zadna-primary/10 rounded-full blur-2xl opacity-50"></div>

    <div class="bg-white/80 backdrop-blur-2xl border border-white rounded-[2rem] p-8 sm:p-12 text-center shadow-[0_30px_70px_-15px_rgba(18,124,140,0.18)] relative overflow-hidden">
      <!-- Top Highlight Gradient Line -->
      <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-zadna-primary via-zadna-accent to-zadna-primary"></div>

      <!-- Brand Logo -->
      <div class="flex flex-col items-center mb-6">
        <div class="w-full h-16 relative flex items-center justify-center group cursor-default">
          <div class="absolute inset-0 bg-zadna-primary/5 rounded-full blur-xl scale-75 group-hover:scale-110 transition-transform duration-700"></div>
          <img src="assets/images/logo/zadana-mark.svg" alt="Zadana Logo"
            class="w-full h-full object-contain filter drop-shadow-[0_6px_12px_rgba(18,124,140,0.15)] z-10 transition-transform duration-500 hover:scale-105"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="absolute inset-0 hidden items-center justify-center text-zadna-primary" style="display: none;">
            <span class="text-xl font-black tracking-wider text-zadna-primary">ZADANA</span>
          </div>
        </div>
      </div>

      <!-- Massive 404 Text -->
      <div class="relative inline-block mb-2">
        <span class="absolute -inset-1 bg-gradient-to-r from-zadna-primary to-zadna-accent rounded-lg blur opacity-15"></span>
        <h1 class="relative bg-gradient-to-br from-zadna-primary via-zadna-primaryDark to-zadna-accent bg-clip-text text-8xl font-black leading-none tracking-tight text-transparent sm:text-9xl">
          404
        </h1>
      </div>

      <!-- Error Title -->
      <h2 class="text-2xl font-black text-zadna-bgDark sm:text-3xl tracking-tight mt-4">
        {{ 'NOT_FOUND.TITLE' | translate }}
      </h2>

      <!-- Error Message -->
      <p class="mt-4 text-sm sm:text-base text-gray-500 font-medium leading-relaxed max-w-md mx-auto">
        {{ 'NOT_FOUND.MESSAGE' | translate }}
      </p>

      <!-- Attempted Path Pill -->
      <div *ngIf="attemptedPath" class="mt-6 inline-flex max-w-full items-center gap-2 rounded-full border border-slate-100 bg-slate-50/80 px-4 py-2 text-[11px] font-bold text-slate-500 shadow-sm">
        <span class="uppercase tracking-[0.16em] text-slate-400 shrink-0">{{ 'NOT_FOUND.PATH_LABEL' | translate }}</span>
        <code class="truncate font-mono text-slate-700 font-bold" dir="ltr">/{{ attemptedPath }}</code>
      </div>

      <!-- Action Buttons -->
      <div class="mt-8 pt-2 flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-4">
        <a [routerLink]="isAuthenticated ? '/dashboard' : '/login'"
           class="group relative flex items-center justify-center py-3.5 px-8 overflow-hidden rounded-xl shadow-[0_8px_20px_rgba(18,124,140,0.25)] font-black text-white bg-zadna-primary transition-transform active:scale-[0.98]">
          <div class="absolute inset-0 bg-gradient-to-r from-zadna-primaryDark via-zadna-primary to-zadna-primaryDark opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
          <span class="relative z-10 flex items-center gap-2">
            {{ (isAuthenticated ? 'NOT_FOUND.GO_DASHBOARD' : 'NOT_FOUND.GO_LOGIN') | translate }}
            <svg class="w-4 h-4 transition-transform group-hover:translate-x-1 rtl:group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l7-7m0 0l-7-7m7 7H3"></path>
            </svg>
          </span>
        </a>
        <button type="button" (click)="goBack()"
           class="inline-flex items-center justify-center rounded-xl border-2 border-slate-100 hover:border-zadna-primary/20 bg-white hover:bg-zadna-primary/5 px-8 py-3.5 text-sm font-black text-zadna-primary transition-all active:scale-[0.98]">
          {{ 'NOT_FOUND.GO_BACK' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
