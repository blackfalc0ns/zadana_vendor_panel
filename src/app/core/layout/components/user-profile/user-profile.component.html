<div class="flex items-center gap-3 p-2 bg-transparent hover:bg-slate-50 border border-transparent rounded-[12px] transition-all w-full group overflow-hidden cursor-pointer" [attr.title]="'COMMON.PROFILE' | translate">
    
    <!-- Status Dot overlay over Avatar -->
    <div class="relative">
        <div class="h-9 w-9 shrink-0 bg-zadna-primary/10 border border-zadna-primary/20 rounded-xl flex items-center justify-center text-zadna-primary font-black text-xs uppercase shadow-sm">
            {{ initials }}
        </div>
        <span class="absolute -bottom-0.5 -end-0.5 w-2.5 h-2.5 rounded-full bg-emerald-500 border border-white shadow-[0_0_6px_rgba(16,185,129,0.3)]"></span>
    </div>

    <!-- Info Info -->
    <div class="flex-1 overflow-hidden flex flex-col justify-center min-h-[36px]">
        <h3 class="text-[13px] font-bold text-slate-800 leading-none truncate mb-1">
            {{ userName }}
        </h3>
        <p class="text-[10px] text-slate-500 font-semibold truncate uppercase tracking-widest leading-none">
            {{ userRole }}
        </p>
    </div>

    <!-- Actions (Logout/Context Menu) -->
    <button (click)="onLogout()" 
            class="h-7 w-7 shrink-0 rounded-[8px] text-slate-400 hover:text-rose-600 hover:bg-rose-50 border border-transparent flex items-center justify-center transition-all opacity-0 group-hover:opacity-100 focus:opacity-100 outline-none"
            title="{{ 'COMMON.LOGOUT' | translate }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
    </button>
</div>
