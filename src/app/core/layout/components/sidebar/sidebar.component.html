<aside
  class="vendor-sidebar"
  [class.is-collapsed]="isCollapsed"
  [attr.dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">
  <!-- Brand -->
  <div class="vendor-sidebar__brand">
    <div class="vendor-sidebar__brand-top">
      <a
        routerLink="/dashboard"
        [queryParams]="{ tab: 'overview' }"
        class="vendor-sidebar__logo"
        [attr.title]="'SIDEBAR.DASHBOARD' | translate">
        <img
          src="assets/i18n/images/logo/logo-auth.png"
          alt="Zadana"
          class="vendor-sidebar__logo-full"
          width="800"
          height="309"
        />
      </a>

      <button
        type="button"
        (click)="onToggleMobileMenu()"
        class="vendor-sidebar__close-btn lg:hidden"
        [attr.aria-label]="'HEADER.CLOSE_MENU' | translate"
      >
        <svg class="h-4 w-4" [ngClass]="mobileCloseChevronClass" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
      </button>

      <button
        type="button"
        (click)="onCollapseSidebar()"
        class="vendor-sidebar__collapse-btn hidden lg:inline-flex"
        [attr.aria-label]="(isCollapsed ? 'HEADER.OPEN_MENU' : 'HEADER.CLOSE_MENU') | translate"
      >
        <svg class="h-4 w-4" [ngClass]="collapseToggleChevronClass" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Navigation -->
  <div class="vendor-sidebar__nav-wrap">
    <section *ngFor="let category of menuCategories; trackBy: trackByCategory" class="vendor-sidebar__section">
      <p class="vendor-sidebar__section-title">
        {{ category.label | translate }}
      </p>

      <nav class="vendor-sidebar__nav">
        <ng-container *ngFor="let item of category.items; trackBy: trackByItem">
          <a
            [routerLink]="item.route"
            [queryParams]="item.queryParams"
            [routerLinkActive]="['is-active']"
            [routerLinkActiveOptions]="getLinkActiveOptions(item)"
            class="vendor-sidebar__link"
            [attr.title]="isCollapsed ? null : (item.label | translate)"
            [attr.aria-label]="isCollapsed ? (item.label | translate) : null"
            (mouseenter)="onLinkHoverStart(item.label, $event)"
            (mousemove)="onLinkHoverMove($event)"
            (mouseleave)="hideCursorTooltip()"
            (click)="onNavClick()"
          >
            <span class="vendor-sidebar__link-icon">
              <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5" stroke="currentColor" [innerHTML]="item.icon"></svg>
              <span *ngIf="item.badge && isCollapsed" class="vendor-sidebar__badge-dot" aria-hidden="true"></span>
            </span>

            <span class="vendor-sidebar__link-label">
              <strong>{{ item.label | translate }}</strong>
              <small class="block mt-0.5 font-medium opacity-70">
                {{ item.description | translate }}
              </small>
            </span>

            <span
              *ngIf="item.badge && !isCollapsed"
              class="vendor-sidebar__chip"
              [ngClass]="
                item.badgeType === 'number'
                  ? 'vendor-sidebar__chip--number'
                  : item.badgeType === 'progress'
                    ? 'vendor-sidebar__chip--progress'
                    : 'vendor-sidebar__chip--new'
              "
            >
              {{ item.badge }}
            </span>
          </a>
        </ng-container>
      </nav>
    </section>
  </div>

  @if (isCollapsed && cursorTooltip.visible) {
    <div
      class="vendor-sidebar-cursor-tooltip"
      [class.is-active]="cursorTooltip.active"
      [class.is-rtl]="currentLang === 'ar'"
      [style.left.px]="cursorTooltip.x"
      [style.top.px]="cursorTooltip.y"
      role="tooltip">
      {{ cursorTooltip.text }}
    </div>
  }
</aside>
