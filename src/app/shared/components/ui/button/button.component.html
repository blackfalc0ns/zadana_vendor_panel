<button 
  [type]="type"
  [disabled]="disabled || isLoading"
  [class]="buttonClasses"
  (click)="handleClick($event)"
  class="relative overflow-hidden group">
  
  <!-- Loading Spinner -->
  <svg *ngIf="isLoading" class="w-4 h-4 animate-spin shrink-0" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
  </svg>

  <!-- Content Slot -->
  <span [class.opacity-0]="isLoading" class="flex items-center gap-2 transition-opacity duration-200">
    <ng-content></ng-content>
  </span>

  <!-- Hover Shimmer Effect -->
  <div class="absolute inset-0 bg-white/10 translate-x-[-101%] group-hover:animate-[shimmer_1.5s_infinite] pointer-events-none"></div>
</button>
