<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8">
  <title>Zadana | Vendor Portal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preload Critical Fonts -->
  <link rel="preload" href="assets/fonts/cairo-700.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/fonts/inter-700.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/fonts/material-symbols-outlined.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face {
      font-family: 'Cairo';
      src: url('assets/fonts/cairo-400.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Cairo';
      src: url('assets/fonts/cairo-700.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      font-family: 'Cairo', 'Segoe UI', Tahoma, Verdana, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }
  </style>
  <script>
    (function () {
      var savedLang = localStorage.getItem('vendor_lang') || localStorage.getItem('lang') || 'ar';
      document.documentElement.setAttribute('lang', savedLang);
      document.documentElement.setAttribute('dir', savedLang === 'ar' ? 'rtl' : 'ltr');
    })();
  </script>
</head>

<body>
  <div id="app-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:99999;overflow:hidden;transition:opacity .42s ease;">
    <style>
      .splash-logo-wrap {
        display: flex;
        width: clamp(110px, 15vw, 180px);
        height: auto;
        align-items: center;
        justify-content: center;
      }
      .splash-logo-img {
        width: 100%;
        height: auto;
        object-fit: contain;
        animation: zadnaLogoFlicker 1.8s ease-in-out infinite;
      }
      @keyframes zadnaLogoFlicker {
        0% { opacity: 0.4; transform: scale(0.99); }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 0.4; transform: scale(0.99); }
      }
      @media (max-width: 640px) {
        .splash-logo-wrap { width: min(38vw, 130px); }
      }
    </style>
    <div class="splash-logo-wrap">
      <img src="assets/i18n/images/logo/logo-auth.png" alt="Zadna" class="splash-logo-img">
    </div>
  </div>

  <app-root></app-root>

  <script>
    (function () {
      var splash = document.getElementById('app-loader');
      var minimumVisibleMs = 2400;
      var startedAt = Date.now();
      var hideScheduled = false;

      function hideSplash() {
        if (!splash || hideScheduled) return;
        hideScheduled = true;
        var remainingMs = Math.max(0, minimumVisibleMs - (Date.now() - startedAt));
        setTimeout(function () {
          splash.style.opacity = '0';
          setTimeout(function () { splash.remove(); }, 450);
        }, remainingMs);
      }

      window.addEventListener('load', function () {
        setTimeout(hideSplash, 300);
      });

      // Safety valve
      setTimeout(hideSplash, 8000);
    })();
  </script>
</body>

</html>
