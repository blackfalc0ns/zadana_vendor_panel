<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8">
  <title>Zadana | Vendor Portal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preload Critical Fonts -->
  <link rel="preload" href="assets/fonts/cairo-700.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/fonts/inter-700.ttf" as="font" type="font/ttf" crossorigin>

  <style>
    @font-face {
      font-family: 'Cairo';
      src: url('assets/fonts/cairo-400.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Cairo';
      src: url('assets/fonts/cairo-700.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    /* Zero-Latency Global Styles */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f8fafc;
      font-family: 'Cairo', 'Segoe UI', Tahoma, Verdana, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Modern Minimal Splash Screen */
    #app-loader {
      position: fixed;
      inset: 0;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #127C8C;
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    .loader-logo {
      height: 40px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app-loader">
    <div class="spinner"></div>
    <div style="font-family: Cairo; font-weight: 700; color: #127C8C; letter-spacing: 1px; font-size: 14px;">ZADANA</div>
  </div>
  
  <app-root></app-root>

  <script>
    // Hide loader only when Angular is ready
    window.addEventListener('load', () => {
      const loader = document.getElementById('app-loader');
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => loader.style.display = 'none', 500);
        }, 300); // Tiny delay for smooth transition
      }
    });
  </script>
</body>

</html>
