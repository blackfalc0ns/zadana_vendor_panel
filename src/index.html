<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8">
  <title>Zadana | Vendor Portal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preload Critical Fonts -->
  <link rel="preload" href="assets/fonts/cairo-700.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/fonts/inter-700.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/fonts/material-symbols-outlined.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face {
      font-family: 'Cairo';
      src: url('assets/fonts/cairo-400.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Cairo';
      src: url('assets/fonts/cairo-700.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      font-family: 'Cairo', 'Segoe UI', Tahoma, Verdana, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: opacity 0.42s ease;
    }

    .splash-logo-wrap {
      display: flex;
      width: clamp(120px, 16vw, 190px);
      align-items: center;
      justify-content: center;
    }

    .splash-logo-img {
      width: 100%;
      height: auto;
      object-fit: contain;
      animation: zadnaLogoPulse 1.8s ease-in-out infinite;
    }

    @keyframes zadnaLogoPulse {
      0% { opacity: 0.15; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.15; transform: scale(0.98); }
    }
  </style>
  <script>
    (function () {
      var savedLang = localStorage.getItem('vendor_lang') || localStorage.getItem('lang') || 'ar';
      document.documentElement.setAttribute('lang', savedLang);
      document.documentElement.setAttribute('dir', savedLang === 'ar' ? 'rtl' : 'ltr');
    })();
  </script>
</head>

<body>
  <div id="app-loader" role="status" aria-live="polite">
    <div class="splash-logo-wrap">
      <img src="assets/i18n/images/logo/logo-auth.png" alt="Zadana" class="splash-logo-img">
    </div>
  </div>

  <app-root></app-root>

  <script>
    (function () {
      // The Angular AppComponent.dismissSplash() takes over hiding the splash
      // once the app has bootstrapped and the first route is ready.
      // This safety valve only fires if Angular fails to bootstrap entirely.
      var splash = document.getElementById('app-loader');

      function hideSplash() {
        if (!splash) return;
        splash.style.opacity = '0';
        setTimeout(function () { splash.remove(); }, 450);
      }

      // Safety valve – only if Angular never bootstraps (e.g. fatal JS error)
      setTimeout(hideSplash, 12000);
    })();
  </script>
</body>

</html>
